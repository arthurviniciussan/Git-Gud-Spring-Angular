<app-default-login-layout 
title="Sign in and Git Gud!" 
primaryBtnText="Signup Now" 
secundaryBtnText="Login now"
(submit)="submit()"
(navigate)="navigate()"
[disablePrimaryBtn]="!signupForm.valid"
>
<form [formGroup]="signupForm">
    <app-primary-input
        formControlName="name"
        inputName="name"
        type="text"
        label="Your Name"
        placeholder="johndoe">
        
    </app-primary-input>
    <app-primary-input
    formControlName="email"
        inputName="email"
        type="email"
        label="Email"
        placeholder="johndoe@email.com">
        <img src="/assets/email-icon.png" alt="Email icon">
    </app-primary-input>
    <div style="height: 18px;"></div>
    <app-primary-input
    formControlName="password"
        inputName="password"
        type="password"
        label="Your Password"
        placeholder="Your Password">
        <img src="/assets/password-icon.png" alt="Password icon">
    </app-primary-input>
    <app-primary-input
        formControlName="passwordConfirm"
        inputName="passwordConfirm"
        type="password"
        label="Confirm Your Password"
        placeholder="Your Password">
        <img src="/assets/password-icon.png" alt="Password icon">
    </app-primary-input>
</form>
</app-default-login-layout>
