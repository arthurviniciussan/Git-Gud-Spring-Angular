<app-default-login-layout 
title="Login into your account" 
primaryBtnText="login" 
secundaryBtnText="sign up now"
(submit)="submit()"
(navigate)="navigate()"
>

<form [formGroup]="loginForm">
    <app-primary-input
    formControlName="email"
        inputName="email"
        type="email"
        label="Email"
        placeholder="johndoe@email.com">
        <img src="/assets/email-icon.png" alt="Email icon">
    </app-primary-input>
    <div style="height: 18px;"></div>
    <app-primary-input
    formControlName="password"
        inputName="password"
        type="password"
        label="Your Password"
        placeholder="Your Password">
        <img src="/assets/password-icon.png" alt="Password icon">
    </app-primary-input>
    <span>Forgot password?</span>
</form>
     
</app-default-login-layout>
